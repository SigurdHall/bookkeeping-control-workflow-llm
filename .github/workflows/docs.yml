name: Docs Check

on:
  pull_request:
    paths:
      - "README.md"
      - "docs/**"
  push:
    branches: [main]
    paths:
      - "README.md"
      - "docs/**"

jobs:
  docs-check:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Confirm docs workflow ran
        run: |
          echo "Documentation workflow completed successfully."
